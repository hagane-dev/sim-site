<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>🎲 taipi</title>
<style>
/* 7/22: 白ベースを既定に変更 (ユーザー要望「黒が見にくい」案A)。数値を読む画面なので
   明色の方が視認性が高い。夜間閲覧を潰さないよう data-theme="dark" で従来の暗色に戻せる。
   選択は localStorage に保存し、head の先行スクリプトで描画前に適用 (チラつき防止)。
   金/緑/赤は白背景でのコントラスト確保のため明度を落とした値を使う。 */
:root { --bg:#ffffff; --card:#f6f8fa; --line:#d0d7de; --fg:#1f2328; --dim:#656d76;
        --gold:#9a6700; --green:#1a7f37; --red:#cf222e;
        --track:#e6eaef; --hit:#e8f5ec; }
:root[data-theme="dark"] {
        --bg:#0d1117; --card:#161b22; --line:#30363d; --fg:#c9d1d9; --dim:#8b949e;
        --gold:#d4a843; --green:#3fb950; --red:#f85149;
        --track:#21262d; --hit:#12261e; }
* { box-sizing:border-box; }
body { background:var(--bg); color:var(--fg); font-family:'Hiragino Sans',sans-serif;
       margin:0; font-size:14px; }
#lock { display:flex; align-items:center; justify-content:center; min-height:90vh; }
.box { background:var(--card); border:1px solid var(--line); border-radius:10px;
       padding:28px 32px; text-align:center; }
.box h1 { color:var(--gold); font-size:18px; margin:0 0 16px; }
input { background:var(--bg); color:var(--fg); border:1px solid var(--line);
        border-radius:6px; padding:10px 12px; font-size:16px; width:200px; }
button { background:var(--gold); color:var(--bg); border:0; border-radius:6px;
         padding:10px 18px; font-size:14px; font-weight:bold; margin-left:6px; }
.err { color:var(--red); font-size:13px; height:18px; margin-top:10px; }
#app { display:none; }
header { position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--line);
         padding:10px 12px 0; z-index:5; }
header h1 { color:var(--gold); font-size:16px; margin:0 0 8px; }
header .sub { color:var(--dim); font-size:11px; margin-bottom:8px; }
.tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px;
        -webkit-overflow-scrolling:touch; }
.tab { flex:0 0 auto; background:var(--card); border:1px solid var(--line);
       border-radius:16px; padding:6px 14px; color:var(--dim); font-size:13px;
       cursor:pointer; white-space:nowrap; }
.tab.on { background:var(--gold); color:var(--bg); font-weight:bold; border-color:var(--gold); }
main { padding:12px; max-width:760px; margin:0 auto; }
.rcard { background:var(--card); border:1px solid var(--line); border-radius:10px;
         padding:10px 14px; margin-bottom:8px; cursor:pointer;
         display:flex; align-items:center; gap:10px; }
.rcard .rno { color:var(--gold); font-weight:bold; font-size:16px; min-width:38px; }
.rcard .info { flex:1; min-width:0; }
.rcard .t1 { font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rcard .t2 { color:var(--dim); font-size:11px; }
.rcard .done { color:var(--green); font-size:11px; }
.back { color:var(--gold); cursor:pointer; margin-bottom:10px; display:inline-block;
        font-size:14px; }
.race h2 { color:var(--fg); font-size:15px; margin:4px 0 2px; }
.race .meta { color:var(--dim); font-size:12px; margin-bottom:10px; }
.warn { color:var(--red); font-size:11px; }
.scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
table { border-collapse:collapse; width:100%; }
td, th { padding:4px 7px; text-align:right; border-bottom:1px solid var(--track);
         font-size:13px; white-space:nowrap; }
th { color:var(--dim); font-weight:normal; font-size:11px; }
td.name { text-align:left; max-width:110px; overflow:hidden; text-overflow:ellipsis; }
td.num { color:var(--gold); }
tr.hit3 td { background:var(--hit); }
.pos { color:var(--green); font-weight:bold; }
.combos { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
@media (max-width:520px) { .combos { grid-template-columns:1fr; } }
.cb { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
.cb b { color:var(--gold); font-size:12px; }
.cb td, .cb th { font-size:12px; padding:2px 6px; }
.hitrow td { color:var(--green); font-weight:bold; }
.rcard .ring { flex:0 0 auto; }
.rtop { display:flex; flex-direction:column; gap:1px; margin-top:4px; }
.rtop .h { display:flex; align-items:center; gap:6px; font-size:12px; line-height:1.55; }
.rtop .hn { color:var(--gold); min-width:22px; text-align:center; font-weight:bold;
            background:var(--track); border-radius:3px; font-size:11px; }
.rtop .hnm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rtop .hp { color:var(--dim); font-variant-numeric:tabular-nums; font-size:11px; }
.rtop .h.win .hnm { color:var(--fg); font-weight:bold; }
</style>
<script>
/* 描画前にテーマを確定させる (body 描画後だと白→黒のチラつきが出る)。
   localStorage が使えない環境 (プライベートブラウズ等) でも既定の白で動くよう握りつぶす。 */
try { if (localStorage.getItem('simTheme') === 'dark')
        document.documentElement.setAttribute('data-theme', 'dark'); } catch (e) {}
</script></head><body>

<h1 id="hd"></h1>
<div class="sub" id="sub"></div>

function venues() {
  const m = new Map();

}
const PICKS_KEY = '__picks__';
function picks() {
  const out = [];
  for (const r of D.races) {
    for (const h of r.horses) {
      const od = (h.live_odds ?? h.morning_odds) ?? 999;
      if ((h.ev_tan ?? 0) >= 1.3 && h.p_win >= 0.20 && od <= 15) out.push({r, h});
    }
  }
  return out.sort((a, b) => b.h.ev_tan - a.h.ev_tan);
}
function renderTabs() {
  const m = venues();

  pt.className = 'tab' + (venue === PICKS_KEY ? ' on' : '');
  pt.textContent = '🎯狙い ' + picks().length;
  pt.onclick = () => { venue = PICKS_KEY; renderTabs(); renderList(); };
  el.appendChild(pt);
  for (const [k, v] of m) {
    const t = document.createElement('div');
    t.className = 'tab' + (k === venue ? ' on' : '');
    t.textContent = (v.cat === 'jra' ? '🏇' : '🐴') + k;

  }
}
function renderPicks() {

}
function renderList() {

function raceOdds(h) { return h.live_odds ?? h.morning_odds; }
function verdict(r) {
  const top = r.horses[0];
  const parts = [];
  if (r.horses.length <= 10) {
    parts.push(`⚠️ シミュ低信頼 — 少頭数 (${r.horses.length}頭) はシミュが本命を過信しやすい傾向 (実測+10pt程度)。数字は割り引いて`);
  }
  if (top.p_win >= 0.40) {
    parts.push(`🟢 堅そう — 軸は ${top.num} ${top.name} (勝率${(top.p_win*100).toFixed(0)}%・複勝${(top.p_top3*100).toFixed(0)}%)。複勝/ワイドの軸向き`);
  } else if (top.p_win < 0.25) {
    parts.push(`🟡 混戦 — 1位でも勝率${(top.p_win*100).toFixed(0)}%。この帯は荒れ率41% (7/19実測)。基本は見送り、買うなら広いワイド`);
  } else {
    parts.push(`⚪ 標準 — 軸候補 ${top.num} ${top.name} (勝率${(top.p_win*100).toFixed(0)}%)。相手は絞りすぎない`);
  }
  for (const h of r.horses) {
    const od = raceOdds(h);
    if ((h.ev_tan ?? 0) >= 1.3 && h.p_win >= 0.20 && (od ?? 999) <= 15) {
      parts.push(`🎯 妙味 — ${h.num} ${h.name} の単勝 (勝率${(h.p_win*100).toFixed(0)}% × ${od}倍 = 期待値${h.ev_tan})`);
    }
  }
  const s3 = (r.combos.sanpuku || [])[0];
  if (s3) parts.push(`3連複の本線は ${s3.k.join('-')} (${(s3.p*100).toFixed(1)}%)。オッズが${s3.min_odds}倍未満なら割に合わない`);
  return parts;
}

    <div class="meta">${esc(r.start_time)} ${r.rank_note ? '/ ランク ' + esc(r.rank_note) : ''}
      / オッズ${r.odds_updated_at ? esc(r.odds_updated_at) + '時点' : '朝時点'}
      ${r.calibrated ? '' : '<span class="warn">[暫定パラメータ・再校正待ち]</span>'}</div></div>
      ${ringHtml(r, 52)}</div>
    <div class="cb" style="margin-bottom:12px"><b>結論</b><div style="font-size:13px;line-height:1.7;color:var(--fg)">
      ${verdict(r).map(esc).join('<br>')}</div></div>
    <div class="scroll"><table>
      <tr><th>馬</th><th>馬名</th><th>人気</th><th>単勝</th>
          <th>勝率</th><th>複勝率</th><th>単勝EV</th><th>結果</th></tr>${rows}</table></div>
    <div class="combos">
      ${cb('馬連 top5', 'umaren', pair12)}${cb('ワイド top5', 'wide', inTop)}
      ${cb('3連複 top8', 'sanpuku', inTop)}${cb('3連単 top8', 'santan', exact)}
    </div></div>`;
  main.querySelector('.back').onclick = renderList;
  window.scrollTo(0, 0);
}
function jstDate() {
  return new Date(Date.now() + 9*3600*1000).toISOString().slice(0,10).replace(/-/g,'');
}
function lockIfExpired() {
  // 24時間限定の担保: 日付 (JST) が変わったら開きっぱなしのタブも自動ロック。
  // 再読み込み後は新しい日の暗号文になるため、新パスワードが必須になる。
  // 7/22: 保存先を sessionStorage → localStorage に変更 (タブを閉じる度の再入力が煩雑との要望)。
  // 日付跨ぎの自動ロックはこの関数で維持されるので「24時間限定」の設計は変わらない。
  if (D && D.date < jstDate()) { localStorage.removeItem('simpw'); location.reload(); }
}
setInterval(lockIfExpired, 60000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) lockIfExpired(); });
function applyTheme(t) {
  // 白=既定 (属性なし) / 黒=data-theme="dark"。ボタンは「切り替え先」を表示する。
  const root = document.documentElement;
  if (t === 'dark') root.setAttribute('data-theme', 'dark');
  else root.removeAttribute('data-theme');
  const b = document.getElementById('thm');
  if (b) b.textContent = (t === 'dark' ? '☀️' : '🌙');
  try { localStorage.setItem('simTheme', t); } catch (e) {}
}
function initTheme() {
  let t = 'light';
  try { if (localStorage.getItem('simTheme') === 'dark') t = 'dark'; } catch (e) {}
  applyTheme(t);
  document.getElementById('thm').onclick = () =>
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
function boot(d) {
  D = d;
  if (d.date < jstDate()) { localStorage.removeItem('simpw'); }
  document.getElementById('lock').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const dt = D.date;
  document.getElementById('hd').textContent =
    `🎲 taipi ${dt.slice(0,4)}/${+dt.slice(4,6)}/${+dt.slice(6)}`;
  const oddsAt = D.odds_refreshed_at ? ` / オッズ ${D.odds_refreshed_at.slice(11,16)}時点` : ' / オッズ 朝時点';
  document.getElementById('sub').textContent =
    `${D.races.length}R / 生成 ${D.generated_at.replace('T',' ').slice(5,16)}${oddsAt} (🔄で最新化)`;
  document.getElementById('reload').onclick = () => location.reload();
  initTheme();
  venue = picks().length ? PICKS_KEY : vname(D.races[0]);
  renderTabs(); renderList();
}
document.getElementById('f').addEventListener('submit', async ev => {
  ev.preventDefault();
  const e = document.getElementById('e'); e.textContent = '復号中...';
  const pw = document.getElementById('pw').value.trim();
  try { const d = await dec(pw); localStorage.setItem('simpw', pw); boot(d); }
  catch (_) { e.textContent = 'パスワードが違います'; }
});
(async () => {
  const saved = localStorage.getItem('simpw');
  if (!saved) return;
  try { boot(await dec(saved)); } catch (_) {}
})();
</script></body></html>
